// 乗降客数の閾値ごとに [最低人数, 色, 地図上の半径(px)] を定義（多い順）
var STEPS = [
  [160000, '#D73027', 27],
  [ 80000, '#F46D43', 22],
  [ 40000, '#FDAE61', 17],
  [ 20000, '#66BD63', 13],
  [ 10000, '#74ADD1', 10],
  [  5000, '#4575B4',  7],
  [     0, '#313695',  4]
];

function getStep(p) {
  for (var i = 0; i < STEPS.length; i++) {
    if (p >= STEPS[i][0]) return STEPS[i];
  }
  return STEPS[STEPS.length - 1];
}

var map = L.map('map').setView([35.18, 136.91], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

stations.forEach(function(s) {
  var step   = getStep(s.p);
  var color  = step[1];
  var radius = step[2];
  L.circleMarker([s.la, s.lo], {
    radius: radius,
    color: color,
    fillColor: color,
    fillOpacity: 0.78,
    weight: 0.8
  })
  .bindTooltip(s.n + '駅', { direction: 'top', offset: [0, -(radius + 2)] })
  .bindPopup(
    '<div style="font-family:sans-serif;min-width:210px;">' +
    '<div style="font-size:16px;font-weight:bold;border-bottom:2px solid #333;' +
    'margin-bottom:7px;padding-bottom:4px;">' + s.n + '駅</div>' +
    (s.m ? '<div style="color:#888;font-size:11px;margin-bottom:6px;">※複数事業者の乗降客数合算</div>' : '') +
    '<table style="border-collapse:collapse;width:100%;font-size:13px;">' +
    (s.m ? '' :
      '<tr><td style="color:#666;padding:2px 8px 2px 0;white-space:nowrap;">運営会社</td>' +
      '<td>' + s.c + '</td></tr>' +
      '<tr><td style="color:#666;padding:2px 8px 2px 0;white-space:nowrap;">路線名</td>' +
      '<td>' + s.r + '</td></tr>'
    ) +
    '</table>' +
    '<div style="margin-top:8px;border-top:1px solid #ddd;padding-top:6px;">' +
    '<span style="color:#333;font-size:12px;">2024年 乗降客数</span><br>' +
    '<span style="font-size:20px;font-weight:bold;">' + s.p.toLocaleString() + '</span>' +
    '<span style="font-size:12px;"> 人/日</span></div></div>',
    { maxWidth: 270 }
  )
  .addTo(map);
});
