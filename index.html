  var color  = step[1];
  var radius = step[2];
  var m = L.circleMarker([s.la, s.lo], {
    radius: radius, color: color, fillColor: color, fillOpacity: 0.78, weight: 0.8
  })
  .bindTooltip(esc(s.n) + '駅', { direction: 'top', offset: [0, -(radius + 2)] })
  .bindPopup(
    '<div class="popup-box">' +
    '<div class="popup-name">' + esc(s.n) + '駅</div>' +
    (s.m ? '<div class="popup-merged">※複数事業者の乗降客数合算</div>' : '') +
    '<table class="popup-tbl">' +
    (s.m ? '' :
      '<tr><td class="popup-lbl">運営会社</td><td>' + esc(s.c) + '</td></tr>' +
      '<tr><td class="popup-lbl">路線名</td><td>' + esc(s.r) + '</td></tr>'
    ) +
    '</table>' +
    '<div class="popup-pax">' +
    '<span class="popup-pax-yr">2024年 乗降客数</span><br>' +
    '<span class="popup-pax-num">' + s.p.toLocaleString() + '</span>' +
    '<span class="popup-pax-unit"> 人/日</span></div></div>',
    { maxWidth: 220 }
  )
  .addTo(map);

  var lbl = L.marker([s.la, s.lo], {
    icon: L.divIcon({
      className: 'stn-label',
      html: esc(s.n),
      iconAnchor: [-(radius + 4), 7],
      iconSize: null
    }),
    interactive: false,
    zIndexOffset: -500
  });

  allItems.push({ marker: m, label: lbl, stepIdx: si, data: s, visible: true });
});

// ── ラベル表示制御（ズーム14以上で駅名表示）──────────────────
function updateLabels() {
  var show = map.getZoom() >= LABEL_ZOOM;
  allItems.forEach(function(item) {
    if (!item.visible) return;
    if (show) { item.label.addTo(map); } else { map.removeLayer(item.label); }
  });
}
map.on('zoomend', updateLabels);

// ── 凡例フィルタ ──────────────────────────────────────────────
function setItemVisible(item, show) {
  item.visible = show;
  if (show) {
    item.marker.addTo(map);
    if (map.getZoom() >= LABEL_ZOOM) item.label.addTo(map);
  } else {
    map.removeLayer(item.marker);
    map.removeLayer(item.label);
  }
}

function showAll() {
  selectedSteps.clear();
  document.querySelectorAll('.leg-row').forEach(function(r) { r.classList.remove('leg-active'); });
  document.getElementById('leg-reset').style.display = 'none';
  allItems.forEach(function(item) { setItemVisible(item, true); });
}

document.querySelectorAll('.leg-row').forEach(function(row) {
  row.addEventListener('click', function() {
    var idx = parseInt(this.getAttribute('data-step'));
    if (selectedSteps.has(idx)) { selectedSteps.delete(idx); this.classList.remove('leg-active'); }
    else { selectedSteps.add(idx); this.classList.add('leg-active'); }
    if (selectedSteps.size === 0) {
      showAll();
    } else {
      document.getElementById('leg-reset').style.display = 'block';
      allItems.forEach(function(item) { setItemVisible(item, selectedSteps.has(item.stepIdx)); });
    }
  });
});

document.getElementById('leg-reset').addEventListener('click', showAll);

// ── 検索 ──────────────────────────────────────────────────────
var searchInput   = document.getElementById('search-input');
var searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', function() {
  var q = this.value.trim();
  searchResults.innerHTML = '';
  if (!q) return;
  var hits = stations.filter(function(s) { return s.n.indexOf(q) >= 0; }).slice(0, 10);
  hits.forEach(function(s) {
    var div = document.createElement('div');
    div.className = 'search-item';
    div.innerHTML = esc(s.n) + '駅<div class="search-item-sub">' + esc(s.c) + '・' + esc(s.r) + '</div>';
    div.addEventListener('click', function() {
      searchResults.innerHTML = '';
      searchInput.value = s.n;
      map.panTo([s.la, s.lo]);
      var found = allItems.find(function(item) { return item.data === s; });
      if (found) found.marker.openPopup();
    });
    searchResults.appendChild(div);
  });
});

document.addEventListener('click', function(e) {
  if (!document.getElementById('search-box').contains(e.target)) {
    searchResults.innerHTML = '';
  }
});


</script>
</body>
</html>
